name: Build Android Release

on:
  push:
    # Solo se activa con etiquetas de versión. Sin paths-ignore: combinado
    # con un trigger de tags puede saltarse la build si el commit etiquetado
    # sólo toca .md — y el commit de release toca changelog/README.
    tags:
      - 'v*'

# Necesario para crear la Release; no depender del default del repo.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        # JDK 21 to match the F-Droid buildserver default → reproducible build
        # (F-Droid moved its buildserver to JDK 21; aligning here keeps classes.dex
        # byte-identical between this release and the F-Droid rebuild).
        java-version: '21'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.7'
        channel: 'stable'

    - name: Get Dependencies
      run: flutter pub get

    # Reproducible Builds — strip the build-id embedded by the linker into
    # libdartjni.so (transitive `jni` dep). Without this, every build produces
    # a different .so and the APK fails IzzyOnDroid RB verification.
    # Reported by IzzySoft in Issue #6 (oksigenia-sos GitHub).
    - name: Patch jni for Reproducible Builds
      run: sed -i -e 's/-Wl,/-Wl,--build-id=none,/' $HOME/.pub-cache/hosted/*/jni-*/src/CMakeLists.txt

    - name: Create Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > android/app/upload-keystore.jks
        echo "storePassword=${{ secrets.KEY_PASSWORD }}" > android/key.properties
        echo "keyPassword=${{ secrets.ALIAS_PASSWORD }}" >> android/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
        echo "storeFile=upload-keystore.jks" >> android/key.properties

    - name: Build Split APKs
      run: flutter build apk --release --split-per-abi

    # Release body = the F-Droid changelog for this version, so notes live in
    # one place and the GitHub Release is never empty.
    - name: Resolve changelog path
      id: changelog
      run: |
        code="$(sed -n -E 's/^version:\s*.+\+([0-9]+).*/\1/p' pubspec.yaml)"
        echo "path=metadata/en-US/changelogs/${code}.txt" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: build/app/outputs/flutter-apk/app-*-release.apk
        body_path: ${{ steps.changelog.outputs.path }}
        draft: false
        # Tags con sufijo (v4.2.0-beta.1) → pre-release: GitHub no las marca
        # como "latest" y el crawler de IzzyOnDroid no las publica. Sólo los
        # tags limpios (v4.2.0) llegan a Izzy.
        prerelease: ${{ contains(github.ref_name, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
